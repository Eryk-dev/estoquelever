# ============================================================
# SISO — Erros Conhecidos e Corrigidos
#
# Este arquivo serve como base de conhecimento para diagnostico
# rapido de erros recorrentes. Sempre que um erro for corrigido,
# adicione uma entrada aqui seguindo o formato abaixo.
#
# Para consultar: grep por message, source, category ou tags.
# ============================================================

# Formato de cada entrada:
# - id: identificador curto e unico (kebab-case)
#   date: YYYY-MM-DD da correcao
#   source: modulo que gerou o erro (webhook, processor, worker, etiqueta-service, oauth, etc)
#   category: validation | database | external_api | auth | config | business_logic | infrastructure
#   message: mensagem do erro (como aparece nos logs)
#   cause: causa raiz identificada
#   fix: o que foi feito para corrigir
#   files: lista de arquivos alterados
#   commit: hash do commit (opcional)
#   tags: palavras-chave para busca rapida
#   notes: observacoes adicionais (opcional)

erros:
  - id: embalagem-hidden-items-block-completion
    date: "2026-03-18"
    source: confirmar-item-embalagem
    category: business_logic
    message: "Pedido never reaches pedido_completo=true despite all visible items completed"
    cause: >
      The pending items count in confirmar-item-embalagem counted ALL items
      (including indisponivel/cancelado), but checklist-items hides those from
      the UI. User completes all visible items but backend still sees pending
      items, so pedido_completo stays false, no label prints, no toast shown.
      Same issue in siso_processar_bip_embalagem RPC (excluded cancelado but
      not indisponivel). Also separacao route total_itens included indisponivel
      items, showing wrong progress (e.g. 3/4 when only 3 items visible).
    fix: >
      Added NOT IN ('indisponivel','cancelado') filter to pending count in
      confirmar-item-embalagem. Updated siso_processar_bip_embalagem RPC to
      exclude indisponivel in both item search and pending count. Fixed
      separacao route to skip indisponivel items in item stats.
    files:
      - src/app/api/separacao/confirmar-item-embalagem/route.ts
      - src/app/api/separacao/route.ts
      - supabase/migrations/20260318_fix_embalagem_hidden_items_count.sql
    tags: [embalagem, etiqueta, indisponivel, cancelado, pedido_completo, hidden-items, compra_status]

