    tags: [checklist, reiniciar, separacao, react-query, cache, otimista]

  - id: embalagem-pedido-some-ao-concluir
    date: "2026-03-17"
    source: separacao
    category: business_logic
    message: "Pedido concluido some da tela de embalagem impossibilitando conferencia"
    cause: "A query da embalagem busca status_separacao=separado. Quando pedido transiciona para embalado, sai da resposta da API no proximo refetch (5s). O check de empty state usava pedidos.length === 0, que ficava true quando todos pedidos eram concluidos, escondendo a secao Embalados com os pedidos ja completados."
    fix: "Mudado check de empty state para pedidos.length === 0 && completedPedidos.length === 0. Botao 'Salvar para depois' muda para 'Voltar' quando nao ha pedidos ativos."
    files:
      - src/app/separacao/embalagem/page.tsx
    tags: [embalagem, pedido, concluir, empty-state, conferencia, react-query]

  - id: tiny-429-agrupamento-etiquetas
    date: "2026-03-17"
    source: agrupamento-service
    category: infrastructure
    message: "Tiny API GET /expedicao/{id}/expedicao/{id}/etiquetas → 429 after 3 retries"
    cause: "agrupamento-service disparava N requisicoes de etiqueta em paralelo (Promise.allSettled) sem nenhum rate limiting. Com 11+ expedicoes no mesmo agrupamento, estourava o limite de 60 req/min do Tiny. O rate-limiter.ts (Supabase-based) nao era usado por agrupamento-service nem etiqueta-service. Outros modulos (webhook-processor, execution-worker) usavam waitForRateLimit mas isso era lento (2+ DB queries por API call) e nao prevenia bursts concorrentes."
    fix: "Criado tiny-queue.ts — fila in-memory com sliding window (55 req/60s) + controle de concorrencia (max 5 por empresa) usando AsyncLocalStorage. Integrado ao tinyFetch: quando chamado dentro de runWithEmpresa(), cada request passa pela fila automaticamente. Todos os callers migrados de waitForRateLimit/registerApiCall para runWithEmpresa(). O 429 retry em tinyFetch permanece como defense-in-depth."
    files:
      - src/lib/tiny-queue.ts
      - src/lib/tiny-api.ts
      - src/lib/agrupamento-service.ts
      - src/lib/etiqueta-service.ts
      - src/lib/webhook-processor.ts
      - src/lib/execution-worker.ts
      - src/lib/nf-webhook-handler.ts
      - src/app/api/compras/conferir/route.ts
      - src/app/api/tiny/stock/ajustar/route.ts
      - src/app/api/separacao/localizacao/route.ts
    tags: [429, rate-limit, tiny-api, queue, concurrency, agrupamento, etiqueta, burst]

  - id: 10
    date: "2026-03-17"
    source: siso_loc_sort_key (PostgreSQL RPC)
    category: database
    message: "upper bound of FOR loop cannot be null"
    cause: "siso_loc_sort_key('') — string_to_array('', '-') retorna array vazio, array_length retorna NULL, FOR i IN 1..NULL crashava. 26 rows em siso_pedido_item_estoques tinham localizacao = '' (vazio, nao NULL)."
    fix: "Adicionado check para string vazia (loc = '') no inicio da funcao, e guard contra array_length NULL antes do FOR loop. Ambos retornam NULL cedo."
    files:
      - supabase/migrations/20260317_fix_loc_sort_key_empty_string.sql
      - supabase/migrations/20260317_natural_loc_sort.sql
    tags: [postgres, rpc, for-loop, null, localizacao, separacao, sort]

  - id: agrupamento-nf-ja-expedida-bloqueia-lote
    date: "2026-03-18"
    source: agrupamento-service
    category: external_api
    message: "Nota fiscal com id 'X' já foi expedida"
    cause: "Ao criar agrupamento via POST /expedicao, se qualquer NF do lote já foi expedida no Tiny (manualmente ou por fluxo antigo), o Tiny rejeita o lote INTEIRO com 400. Uma única NF problemática bloqueava dezenas de pedidos válidos. Erro repetia em loop a cada tentativa pois a NF nunca era removida do lote."
    fix: "Adicionado retry loop em processarGrupo: quando Tiny retorna erro 'já foi expedida', extrai o NF ID via regex, remove do lote, marca o pedido como 'expedido_externo', e retenta com os NFs restantes. Máximo 5 retries por grupo."
    files:
      - src/lib/agrupamento-service.ts
    tags: [agrupamento, expedicao, tiny-api, nf-expedida, retry, lote, bloqueio]

  - id: marcar-item-race-condition-iniciar
    date: "2026-03-20"
    source: separacao-marcar-item
    category: business_logic
    message: "Erro ao salvar marcacao"
    cause: "Race condition: checklist page calls /api/separacao/iniciar fire-and-forget on mount while loading items independently. If user clicks a checkbox before iniciar completes, orders are still in 'aguardando_separacao' and marcar-item rejects with 400 (only accepted 'em_separacao')."
    fix: "Relaxed marcar-item validation to accept both 'em_separacao' and 'aguardando_separacao' statuses. Safe because the checklist is only accessible from the separation flow and iniciar will transition orders shortly."
    files:
      - src/app/api/separacao/marcar-item/route.ts
      - docs/api-reference.md
    tags: [separacao, checklist, marcar-item, race-condition, aguardando_separacao, em_separacao]
