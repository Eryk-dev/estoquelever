  - id: etiqueta-fire-and-forget-silent-failure
    date: "2026-03-16"
    source: etiqueta-service
    category: business_logic
    message: "Etiqueta nao imprime mas pedido some da aba de embalagem"
    cause: "buscarEImprimirEtiqueta era chamado fire-and-forget (.catch) nos 3 endpoints (bipar, bipar-embalagem, confirmar-item-embalagem). O status_separacao era atualizado para 'embalado' ANTES da impressao (dentro do RPC), e a resposta da API era enviada ao frontend sem aguardar o resultado da impressao. Se a impressao falhava, o pedido ja tinha sumido da UI com toast 'etiqueta enviada'."
    fix: "1) buscarEImprimirEtiqueta agora retorna { success, error? } em vez de void. 2) Todos os 3 endpoints agora fazem await da impressao e incluem etiqueta_status + etiqueta_erro na resposta. 3) Frontend mostra toast correto baseado no resultado real (sucesso vs falha com mensagem de erro)."
    files:
      - src/lib/etiqueta-service.ts
      - src/app/api/separacao/bipar/route.ts
      - src/app/api/separacao/bipar-embalagem/route.ts
      - src/app/api/separacao/confirmar-item-embalagem/route.ts
      - src/app/separacao/embalagem/page.tsx
      - src/components/separacao/scan-input.tsx
    tags: [etiqueta, impressao, fire-and-forget, embalagem, silent-failure, printnode, label]
    notes: "A impressao no slow path pode levar 3-5s (criar agrupamento + baixar ZPL). Isso agora bloqueia a resposta do endpoint, mas o operador precisa saber se a etiqueta saiu ou nao."

  - id: agrupamento-sem-retry-no-concluir
    date: "2026-03-16"
    source: agrupamento-service
    category: business_logic
    message: "Etiqueta nao disponivel na hora de imprimir — agrupamento nao criado ou ZPL nao cacheado"
    cause: "preCriarAgrupamentosEmLote era chamado somente no iniciar (fire-and-forget). Se falhasse, nao havia segunda tentativa antes da impressao. Problemas adicionais: 1) agrupamento_expedicao_id ficava travado em 'pending' apos crash; 2) salvarEtiqueta salvava etiqueta_url com etiqueta_zpl = null quando download falhava, fazendo fast path sempre falhar."
    fix: "1) Adicionado recarregarEtiquetasFaltantes() chamado no concluir para re-baixar ZPL de pedidos com agrupamento mas sem ZPL cacheado. 2) Adicionado recuperarPendingTravados() para limpar agrupamento_expedicao_id = 'pending' travados >5min. 3) salvarEtiqueta agora so salva etiqueta_zpl se download realmente sucedeu. 4) concluir agora tambem chama preCriarAgrupamentosEmLote como segunda tentativa."
    files:
      - src/lib/agrupamento-service.ts
      - src/app/api/separacao/concluir/route.ts
    tags: [agrupamento, etiqueta, pre-criacao, retry, concluir, pending, zpl, cache, download]

  - id: checklist-reiniciar-nao-reseta-visual
    date: "2026-03-17"
    source: separacao
    category: business_logic
    message: "Reiniciar progresso no checklist nao reseta visualmente os itens marcados"
    cause: "handleReiniciar usava apenas invalidateQueries que agenda refetch em background mas mantem dados stale visiveis ate o refetch completar. Em condicoes de rede lentas ou timing infeliz, os itens permaneciam visualmente marcados."
    fix: "Adicionado update otimista no cache (setQueryData) para zerar separacao_marcado em todos os itens imediatamente antes do invalidateQueries."
    files:
      - src/app/separacao/checklist/page.tsx
    tags: [checklist, reiniciar, separacao, react-query, cache, otimista]

  - id: embalagem-pedido-some-ao-concluir
    date: "2026-03-17"
    source: separacao
    category: business_logic
    message: "Pedido concluido some da tela de embalagem impossibilitando conferencia"
    cause: "A query da embalagem busca status_separacao=separado. Quando pedido transiciona para embalado, sai da resposta da API no proximo refetch (5s). O check de empty state usava pedidos.length === 0, que ficava true quando todos pedidos eram concluidos, escondendo a secao Embalados com os pedidos ja completados."
    fix: "Mudado check de empty state para pedidos.length === 0 && completedPedidos.length === 0. Botao 'Salvar para depois' muda para 'Voltar' quando nao ha pedidos ativos."
    files:
      - src/app/separacao/embalagem/page.tsx
    tags: [embalagem, pedido, concluir, empty-state, conferencia, react-query]
